apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: devops
  name: grafana
  labels:
    app: grafana
spec:
  selector:
    matchLabels:
      app: grafana
  replicas: 1
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: devops
      containers:
      - name: grafana
        image: <image>
        ports:
          - containerPort: 3000
            protocol: TCP
        volumeMounts:
          - name: data
            mountPath: /var/lib/grafana
      volumes:
        - name: data
          PersistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: devops
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: devops
spec:
  path: /
  to:
    name: grafana
    weight: 100
    kind: Service
  host: '<host>'
