apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: devops
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    matchLabels:
      app: prometheus
  replicas: 1
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: devops
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
      containers:
      - name: prometheus
        image: <image>
        ports:
          - containerPort: 5000
            protocol: TCP
        volumeMounts:
          - name: prometheus-config-volume
            mountPath: /etc/prometheus/prometheus.yml
            subPath: prometheus.yml 
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: devops
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 9090
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prometheus
  namespace: devops
spec:
  path: /
  to:
    name: prometheus
    weight: 100
    kind: Service
  host: '<host>'
  
  
  
global:
  scrape_interval: 15s
  external_labels:
    monitor: 'codelab-monitor'

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'umbra'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:5000']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      external_labels:
        monitor: 'codelab-monitor'

    scrape_configs:
      - job_name: 'prometheus'
        scrape_interval: 5s
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'umbra'
        scrape_interval: 5s
        static_configs:
          - targets: ['<app-host>']

